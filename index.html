<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Shop - WebSys 1 Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Carl PRODUCTS</h1>
        <div class="cart-icon-container">
            🛒 Cart <span id="cart-count">0</span>
        </div>
    </header>

    <main class="container">
        <section id="product-list" class="product-grid">
            </section>

        <aside class="cart-section">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items">
                <p class="empty-msg">Your cart is currently empty.</p>
            </div>
            <hr>
            <div class="cart-footer">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
                <button id="clear-cart" class="btn-clear">Clear Cart</button>
                <button id="checkout-btn" class="btn-checkout">Checkout</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
